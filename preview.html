<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdsFlow - Automacao de Campanhas Meta Ads</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0B0F17; color: #F1F5F9; min-height: 100vh; padding: 28px 18px; }
    .container { max-width: 820px; margin: 0 auto; }
    .brand { font-size: 12px; font-weight: 700; color: #6366F1; letter-spacing: 1px; }
    h1 { font-size: 22px; font-weight: 800; margin: 4px 0 2px; }
    .subtitle { font-size: 13px; color: #8B96A8; }
    .stepper { display: flex; gap: 4px; margin-bottom: 22px; flex-wrap: wrap; }
    .step { display: flex; align-items: center; gap: 6px; flex: 1 1 auto; min-width: 60px; }
    .step-circle { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; border: 1px solid #232D40; background: #1A2333; color: #8B96A8; }
    .step-circle.active { background: #6366F1; border-color: #6366F1; color: #fff; }
    .step-circle.done { background: #22C55E; border-color: #22C55E; color: #fff; }
    .step-label { font-size: 11px; font-weight: 700; color: #8B96A8; white-space: nowrap; }
    .step-label.active { color: #F1F5F9; }
    .step-line { flex: 1; height: 1px; background: #232D40; min-width: 8px; }
    .panel { background: #121826; border: 1px solid #232D40; border-radius: 14px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .label { font-size: 12px; font-weight: 600; color: #8B96A8; }
    .input { width: 100%; margin-top: 6px; background: #1A2333; border: 1px solid #232D40; border-radius: 8px; padding: 10px 12px; color: #F1F5F9; font-size: 14px; outline: none; font-family: inherit; }
    .input:focus { border-color: #6366F1; }
    .input::placeholder { color: #56607A; }
    select.input { cursor: pointer; }
    textarea.input { resize: vertical; }
    .btn { background: #6366F1; border: none; color: #fff; font-weight: 700; font-size: 14px; padding: 12px 0; border-radius: 9px; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-back { background: none; border: none; color: #8B96A8; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
    .btn-back:hover { color: #F1F5F9; }
    .funnel-btn { flex: 1 1 150px; text-align: left; background: #1A2333; border: 1px solid #232D40; border-radius: 9px; padding: 10px 12px; color: #F1F5F9; cursor: pointer; transition: all 0.2s; }
    .funnel-btn.active { background: rgba(99,102,241,0.15); border-color: #6366F1; }
    .funnel-btn:hover { border-color: #6366F1; }
    .funnel-title { font-weight: 700; font-size: 13px; }
    .funnel-desc { font-size: 11px; color: #8B96A8; margin-top: 2px; }
    .flex-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .flex-1-200 { flex: 1 1 200px; }
    .flex-1-140 { flex: 1 1 140px; }
    .country-card { background: #121826; border: 1px solid #232D40; border-radius: 12px; padding: 16px; display: flex; gap: 14px; align-items: center; text-align: left; cursor: pointer; transition: border-color 0.2s; }
    .country-card:hover { border-color: #6366F1; }
    .score-ring { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .score-ring svg { width: 52px; height: 52px; }
    .score-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; }
    .country-name { font-size: 15px; font-weight: 800; }
    .badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .badge-green { color: #22C55E; background: rgba(34,197,94,0.13); }
    .badge-amber { color: #F59E0B; background: rgba(245,158,11,0.13); }
    .badge-red { color: #F87171; background: rgba(248,113,113,0.13); }
    .country-reason { font-size: 12.5px; color: #8B96A8; margin: 6px 0; }
    .country-meta { display: flex; gap: 14px; font-size: 12px; color: #B0B9CC; }
    .arrow { color: #6366F1; font-size: 18px; }
    .summary-box { background: rgba(99,102,241,0.15); border: 1px solid #6366F1; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 14px; color: #C7D2FE; }
    .network-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 6px; }
    .network-btn { background: #1A2333; border: 1px solid #232D40; border-radius: 8px; padding: 8px 10px; text-align: left; color: #F1F5F9; cursor: pointer; transition: all 0.2s; }
    .network-btn.active { background: rgba(99,102,241,0.15); border-color: #6366F1; }
    .network-btn:hover { border-color: #6366F1; }
    .network-name { font-weight: 700; font-size: 12.5px; }
    .network-tag { font-size: 10px; color: #8B96A8; }
    .slug-preview { margin-top: 6px; font-size: 12.5px; color: #6366F1; font-family: monospace; }
    .template-grid { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .template-btn { flex: 1 1 180px; text-align: left; background: #1A2333; border: 1px solid #232D40; border-radius: 9px; padding: 10px 12px; color: #F1F5F9; cursor: pointer; transition: all 0.2s; }
    .template-btn.active { background: rgba(99,102,241,0.15); border-color: #6366F1; }
    .template-btn:hover { border-color: #6366F1; }
    .spinner { display: flex; align-items: center; gap: 10px; color: #8B96A8; font-size: 13px; }
    .spinner-circle { width: 16px; height: 16px; border: 2px solid #232D40; border-top-color: #6366F1; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ad-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; margin-bottom: 16px; }
    .ad-card { border-radius: 14px; overflow: hidden; border: 1px solid #232D40; }
    .ad-card-header { padding: 8px 14px; background: rgba(0,0,0,0.15); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .ad-card-body { padding: 18px; }
    .ad-headline { font-size: 17px; font-weight: 800; margin-bottom: 8px; line-height: 1.25; }
    .ad-text { font-size: 13px; line-height: 1.5; margin-bottom: 14px; opacity: 0.9; }
    .ad-cta { border: none; color: #fff; font-weight: 700; font-size: 13px; padding: 9px 16px; border-radius: 8px; margin-bottom: 12px; cursor: pointer; }
    .ad-style { font-size: 11px; opacity: 0.7; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 8px; }
    .section-title { font-size: 12px; font-weight: 700; color: #6366F1; margin-bottom: 10px; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; font-size: 13px; }
    .big-number { font-size: 28px; font-weight: 800; }
    .big-number span { font-size: 13px; color: #8B96A8; font-weight: 600; }
    .bar-track { display: flex; height: 10px; border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 12px; background: #1A2333; border: 1px solid #232D40; border-radius: 999px; padding: 4px 10px; }
    .tag-accent { background: rgba(99,102,241,0.15); border-color: #6366F1; }
    .activate-btn { background: #22C55E; border: none; color: #fff; font-weight: 800; font-size: 15px; padding: 14px 28px; border-radius: 10px; cursor: pointer; }
    .activate-btn:hover { background: #16a34a; }
    .dim-text { font-size: 11px; color: #8B96A8; margin-top: 10px; }
    .hidden { display: none !important; }
    .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .tone-select { width: 150px; margin-top: 0; }
    .generate-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .generate-actions { display: flex; gap: 10px; align-items: center; }
    .success-icon { font-size: 32px; }
    .success-title { font-weight: 800; font-size: 15px; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <div class="brand">ADSFLOW</div>
      <h1>Produto → Mercado → Presell → Anúncio → Campanha</h1>
      <p class="subtitle">Protótipo funcional — IA para análise de mercado, copy e segmentação.</p>
    </div>

    <div class="stepper" id="stepper"></div>

    <div id="step1" class="panel">
      <div>
        <label class="label">Produto *</label>
        <input class="input" id="product" placeholder="Ex: cápsulas emagrecedoras naturais">
      </div>
      <div>
        <label class="label">Descrição (opcional)</label>
        <textarea class="input" id="description" rows="2" placeholder="Diferenciais, faixa de preço, para quem é indicado..."></textarea>
      </div>
      <div class="flex-row">
        <div class="flex-1-200">
          <label class="label">Público-alvo (opcional)</label>
          <input class="input" id="audience" placeholder="Ex: mulheres 30-50 anos">
        </div>
        <div class="flex-1-140">
          <label class="label">Orçamento de mídia</label>
          <select class="input" id="budget">
            <option value="baixo">Baixo</option>
            <option value="medio" selected>Médio</option>
            <option value="alto">Alto</option>
          </select>
        </div>
      </div>
      <div>
        <label class="label">Estágio de funil</label>
        <div class="funnel-selector" id="funnelSelector" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap"></div>
      </div>
      <button class="btn" onclick="goStep2()">Analisar mercados →</button>
    </div>

    <div id="step2" class="hidden">
      <button class="btn-back" onclick="goStep1()">← Editar produto</button>
      <div id="marketLoading" class="hidden">
        <div class="panel"><div class="spinner"><div class="spinner-circle"></div>Analisando mercados globais com IA...</div></div>
      </div>
      <div id="marketResults" class="hidden"></div>
    </div>

    <div id="step3" class="hidden">
      <button class="btn-back" onclick="goStep2back()">← Trocar país</button>
      <div class="panel">
        <div>
          <label class="label">Rede de afiliados</label>
          <div class="network-grid" id="networkGrid"></div>
        </div>
        <div id="networkFields" class="hidden">
          <div>
            <label class="label">Link de afiliado (<span id="networkLabel"></span>)</label>
            <input class="input" id="affLink" placeholder="Cole aqui o link da oferta original">
          </div>
          <div class="flex-row">
            <div class="flex-1-200">
              <label class="label">Idioma da presell</label>
              <input class="input" id="presellLang">
            </div>
            <div class="flex-1-200">
              <label class="label">Domínio da presell</label>
              <input class="input" id="domainSlug" placeholder="nome-do-produto" oninput="updateSlug()">
              <div class="slug-preview" id="slugPreview">http://localhost:3000/p/meu-produto</div>
            </div>
          </div>
          <div>
            <label class="label">Template da presell</label>
            <div class="template-grid" id="templateGrid"></div>
          </div>
          <button class="btn" id="btnGenAds" disabled onclick="goStep4()">Gerar anúncios →</button>
        </div>
      </div>
    </div>

    <div id="step4" class="hidden">
      <button class="btn-back" onclick="goStep3()">← Editar presell</button>
      <div class="panel">
        <div class="generate-header">
          <div>
            <div class="label">Gerando anúncios para</div>
            <div style="font-size:18px;font-weight:800;margin-top:2px" id="genTarget"></div>
          </div>
          <div class="generate-actions">
            <select class="input tone-select" id="tone">
              <option value="confiante">Confiante</option>
              <option value="divertido">Divertido</option>
              <option value="urgente">Urgente</option>
              <option value="premium">Premium</option>
              <option value="acolhedor">Acolhedor</option>
            </select>
            <button class="btn" id="btnGenerate" onclick="generateCopy()" style="width:auto;padding:10px 18px;font-size:13px">Gerar anúncios</button>
          </div>
        </div>
        <div id="copyLoading" class="hidden" style="margin-top:14px"><div class="spinner"><div class="spinner-circle"></div>Criando 3 variações de anúncio com IA...</div></div>
      </div>
      <div id="adResults" class="hidden"></div>
      <button class="btn hidden" id="btnCampaign" onclick="goStep5()" style="width:100%">Montar campanha →</button>
    </div>

    <div id="step5" class="hidden">
      <button class="btn-back" onclick="goStep4back()">← Editar anúncios</button>
      <div id="campaignContent"></div>
    </div>
  </div>

  <script>
    const C = { bg:"#0B0F17", panel:"#121826", panelAlt:"#1A2333", border:"#232D40", accent:"#6366F1", accentSoft:"rgba(99,102,241,0.15)", green:"#22C55E", amber:"#F59E0B", red:"#F87171", text:"#F1F5F9", dim:"#8B96A8" };
    const FUNNEL_STAGES = [{id:"topo",label:"Topo de funil",desc:"Descoberta"},{id:"meio",label:"Meio de funil",desc:"Consideração"},{id:"fundo",label:"Fundo de funil",desc:"Decisão"}];
    const NETWORKS = [{id:"hotmart",name:"Hotmart",tag:"Infoproduto"},{id:"kiwify",name:"Kiwify",tag:"Infoproduto"},{id:"eduzz",name:"Eduzz",tag:"Infoproduto"},{id:"monetizze",name:"Monetizze",tag:"Infoproduto/Físico"},{id:"braip",name:"Braip",tag:"Recorrência/Físico"},{id:"clickbank",name:"ClickBank",tag:"Global"},{id:"amazon",name:"Amazon Associados",tag:"E-commerce"},{id:"shopee",name:"Shopee Afiliados",tag:"E-commerce"}];
    const TEMPLATES = {topo:[{id:"advertorial",label:"Advertorial / Notícia",desc:"Formato de matéria, alto engajamento"},{id:"quiz",label:"Quiz interativo",desc:"Engaja e qualifica antes de mostrar a oferta"}],meio:[{id:"comparação",label:"Comparação",desc:"Produto vs concorrentes"},{id:"depoimentos",label:"Depoimentos",desc:"Prova social pra vencer objeções"}],fundo:[{id:"contagem",label:"Contagem regressiva",desc:"Urgência/escassez pra fechar a venda"},{id:"depoimentos",label:"Depoimentos",desc:"Refórço de confiança antes do checkout"}]};
    const MOCK_COUNTRIES = [{country:"Brasil",code:"BR",flag:"🇧🇷",score:92,level:"média",lang:"Português",cpm:"$2-5",reason:"Maior mercado de infoprodutos da América Latina. Público altamente receptivo a ofertas digitais."},{country:"Estados Unidos",code:"US",flag:"🇺🇸",score:88,level:"alta",lang:"English",cpm:"$6-12",reason:"Maior mercado de afiliados do mundo. Alta competição mas enorme potencial de conversão."},{country:"México",code:"MX",flag:"🇲🇽",score:78,level:"baixa",lang:"Español",cpm:"$1-3",reason:"Mercado em crescimento rápido com baixa concorrência. CPM muito acessível."},{country:"Portugal",code:"PT",flag:"🇵🇹",score:72,level:"baixa",lang:"Português",cpm:"$2-4",reason:"Público lusófono com poder de compra superior. Pouca competição em nichos digitais."},{country:"Colômbia",code:"CO",flag:"🇨🇴",score:68,level:"baixa",lang:"Español",cpm:"$1-2",reason:"Crescimento acelerado de e-commerce. Custo de CPM muito baixo."},{country:"Argentina",code:"AR",flag:"🇦🇷",score:65,level:"baixa",lang:"Español",cpm:"$1-3",reason:"Público engajado com conteúdo digital. Boa oportunidade para entrada antecipada."}];

    let state = { step:1, product:"", funnel:"meio", country:null, network:null, template:null, slug:"meu-produto", variations:null, campaignData:null, activated:false };

    function renderStepper() {
      const steps = ["Produto","Mercado","Presell","Anúncios","Campanha"];
      document.getElementById("stepper").innerHTML = steps.map((l,i) => {
        const n=i+1, active=n===state.step, done=n<state.step;
        return `<div class="step"><div class="step-circle ${active?"active":""} ${done?"done":""}">${done?"✓":n}</div><span class="step-label ${active?"active":""}">${l}</span>${n<steps.length?'<div class="step-line"></div>':''}</div>`;
      }).join("");
    }

    function initFunnels() {
      const el = document.getElementById("funnelSelector");
      el.innerHTML = FUNNEL_STAGES.map(f => `<button class="funnel-btn ${state.funnel===f.id?"active":""}" onclick="selectFunnel('${f.id}')"><div class="funnel-title">${f.label}</div><div class="funnel-desc">${f.desc}</div></button>`).join("");
    }

    function selectFunnel(id) { state.funnel=id; initFunnels(); }

    function initNetworks() {
      document.getElementById("networkGrid").innerHTML = NETWORKS.map(n => `<button class="network-btn ${state.network?.id===n.id?"active":""}" onclick="selectNetwork('${n.id}','${n.name}')"><div class="network-name">${n.name}</div><div class="network-tag">${n.tag}</div></button>`).join("");
    }

    function selectNetwork(id,name) {
      state.network={id,name};
      initNetworks();
      document.getElementById("networkFields").classList.remove("hidden");
      document.getElementById("networkLabel").textContent=name;
    }

    function initTemplates() {
      const list = TEMPLATES[state.funnel]||[];
      document.getElementById("templateGrid").innerHTML = list.map(t => `<button class="template-btn ${state.template?.id===t.id?"active":""}" onclick="selectTemplate('${t.id}','${t.label.replace(/'/g,"\\'")}')"><div class="funnel-title">${t.label}</div><div class="funnel-desc">${t.desc}</div></button>`).join("");
      updateGenBtn();
    }

    function selectTemplate(id,label) { state.template={id,label}; initTemplates(); }

    function updateGenBtn() { document.getElementById("btnGenAds").disabled = !state.template; }

    function updateSlug() {
      const v = document.getElementById("domainSlug").value.trim().toLowerCase().replace(/[^a-z0-9-]/g,"-").replace(/-+/g,"-") || "meu-produto";
      state.slug=v;
      document.getElementById("slugPreview").textContent="http://localhost:3000/p/"+v;
    }

    function showStep(n) {
      [1,2,3,4,5].forEach(s => document.getElementById("step"+s).classList.toggle("hidden",s!==n));
      state.step=n;
      renderStepper();
      window.scrollTo(0,0);
    }

    function goStep1() { showStep(1); }
    function goStep2back() { showStep(2); }
    function goStep3() { showStep(3); initTemplates(); }
    function goStep4back() { showStep(4); }

    function goStep2() {
      state.product = document.getElementById("product").value;
      if(!state.product.trim()) return;
      showStep(2);
      document.getElementById("marketLoading").classList.remove("hidden");
      document.getElementById("marketResults").classList.add("hidden");
      setTimeout(() => {
        document.getElementById("marketLoading").classList.add("hidden");
        renderMarketResults();
        document.getElementById("marketResults").classList.remove("hidden");
      }, 2000);
    }

    function renderMarketResults() {
      const scoreColor = s => s>=75?C.green:s>=50?C.amber:C.red;
      const compInfo = l => ({baixa:{c:C.green,t:"Baixa concorrência"},média:{c:C.amber,t:"Concorrência média"},alta:{c:C.red,t:"Alta concorrência"}}[l]||{c:C.amber,t:l});
      document.getElementById("marketResults").innerHTML = `
        <div class="summary-box">Análise completa: identificamos os melhores mercados para <strong>${state.product}</strong>. Considere começar pelo Brasil (maior demanda) ou México (menor custo de CPM).</div>
        <div class="label" style="margin-bottom:8px">Escolha um país:</div>
        ${MOCK_COUNTRIES.map(c => {
          const ci = compInfo(c.level);
          return `<div class="country-card" onclick="selectCountry('${c.code}','${c.country}','${c.flag}','${c.lang}','${c.cpm}')">
            <div class="score-ring"><svg><circle cx="26" cy="26" r="23.5" stroke="${C.border}" stroke-width="5" fill="none"/><circle cx="26" cy="26" r="23.5" stroke="${scoreColor(c.score)}" stroke-width="5" fill="none" stroke-dasharray="${2*Math.PI*23.5}" stroke-dashoffset="${2*Math.PI*23.5*(1-c.score/100)}" stroke-linecap="round" transform="rotate(-90 26 26)"/></svg><div class="score-value" style="color:${scoreColor(c.score)}">${c.score}</div></div>
            <div style="flex:1;min-width:0">
              <div><span class="country-name">${c.flag} ${c.country}</span> <span class="badge" style="color:${ci.c};background:${ci.c}22">${ci.t}</span></div>
              <div class="country-reason">${c.reason}</div>
              <div class="country-meta"><span>🗣 ${c.lang}</span><span>💵 CPM ${c.cpm}</span></div>
            </div>
            <span class="arrow">→</span>
          </div>`;
        }).join("")}`;
    }

    function selectCountry(code,country,flag,lang,cpm) {
      state.country={code,country,flag,lang,cpm};
      document.getElementById("presellLang").value=lang;
      showStep(3);
      initNetworks();
      initTemplates();
    }

    function goStep4() {
      state.country.lang = document.getElementById("presellLang").value;
      state.country.slug = state.slug;
      showStep(4);
      document.getElementById("genTarget").textContent = state.country.flag+" "+state.country.country+" · "+state.country.lang;
    }

    function generateCopy() {
      document.getElementById("btnGenerate").disabled=true;
      document.getElementById("btnGenerate").textContent="Gerando...";
      document.getElementById("copyLoading").classList.remove("hidden");
      document.getElementById("adResults").classList.add("hidden");
      document.getElementById("btnCampaign").classList.add("hidden");
      setTimeout(() => {
        const p=state.product;
        state.variations = [
          {label:"Variável A — Confiante",headline:`${p}: a solução que você precisava`,body:`Descubra como ${p} pode transformar seus resultados. Milhares de pessoas já estão usando e aprovando.`,cta:"Saiba Mais",style:"Foto de pessoa sorrindo com produto, fundo vibrante",bg:"#1a1a2e",accent:"#6366F1",text:"#F1F5F9"},
          {label:"Variável B — Urgente",headline:`Última chance: ${p} com desconto`,body:`Não perca tempo! ${p} está com oferta especial por tempo limitado. Garanta já o seu.`,cta:"Garantir Agora",style:"Timer regressivo com foto do produto, cores quentes",bg:"#2d1b1b",accent:"#EF4444",text:"#F1F5F9"},
          {label:"Variável C — Premium",headline:`Experiência premium: ${p}`,body:`Para quem busca excelência. ${p} é a escolha dos que sabem o que querem.`,cta:"Descobrir",style:"Minimalista, fundo escuro, produto em destaque com luz suave",bg:"#0f0f0f",accent:"#F59E0B",text:"#F1F5F9"}
        ];
        document.getElementById("adResults").innerHTML = `<div class="ad-grid">${state.variations.map(v => `<div class="ad-card" style="background:${v.bg};color:${v.text}"><div class="ad-card-header">${v.label}</div><div class="ad-card-body"><div class="ad-headline">${v.headline}</div><div class="ad-text">${v.body}</div><button class="ad-cta" style="background:${v.accent}">${v.cta}</button><div class="ad-style">🎨 ${v.style}</div></div></div>`).join("")}</div>`;
        document.getElementById("copyLoading").classList.add("hidden");
        document.getElementById("adResults").classList.remove("hidden");
        document.getElementById("btnCampaign").classList.remove("hidden");
        document.getElementById("btnGenerate").disabled=false;
        document.getElementById("btnGenerate").textContent="Gerar de novo";
      }, 2500);
    }

    function goStep5() {
      state.campaignData = { keywords:[state.product,"comprar online","melhor preço","oferta especial","frete grátis"], interests:["Marketing digital","Empreendedorismo","Negócios online","Infoprodutos"], placements:["Feed Instagram","Reels","Stories","Feed Facebook"] };
      showStep(5);
      const n=state.network,c=state.country,s=state.slug,t=state.template;
      const funnelReason = state.funnel==="topo"?"Topo de funil precisa de mais alcance.":state.funnel==="fundo"?"Fundo de funil é público qualificado, verba mais enxuta.":"Meio de funil equilibra alcance e qualificação.";
      document.getElementById("campaignContent").innerHTML = `
        <div class="panel"><div class="section-title">RESUMO DA CAMPANHA</div><div class="info-grid">
          <div><div class="label">Produto</div><div style="font-weight:700">${state.product}</div></div>
          <div><div class="label">País</div><div style="font-weight:700">${c.flag} ${c.country}</div></div>
          <div><div class="label">Funil</div><div style="font-weight:700;text-transform:capitalize">${state.funnel}</div></div>
          <div><div class="label">Rede</div><div style="font-weight:700">${n.name}</div></div>
          <div><div class="label">Presell</div><div style="font-weight:700;font-family:monospace;font-size:12px">localhost:3000/p/${s}</div></div>
          <div><div class="label">Template</div><div style="font-weight:700">${t.label}</div></div>
        </div></div>
        <div class="panel"><div class="section-title">VERBA SUGERIDA / DIA</div><div class="big-number">$25 <span>/dia</span></div><div class="dim-text">${funnelReason}</div></div>
        <div class="panel"><div class="section-title">SEGMENTAÇÃO POR DISPOSITIVO</div><div class="bar-track"><div style="width:68%;background:${C.accent}"></div><div style="width:22%;background:${C.green}"></div><div style="width:10%;background:${C.amber}"></div></div><div style="display:flex;gap:16px;font-size:12.5px"><span>📱 Mobile 68%</span><span>🖥 Desktop 22%</span><span>📱 Tablet 10%</span></div></div>
        <div class="panel"><div class="section-title">PALAVRAS-CHAVE E INTERESSES</div><div class="tag-list" style="margin-bottom:12px">${state.campaignData.keywords.map(k=>`<span class="tag">${k}</span>`).join("")}</div><div class="label">Interesses (Meta Ads Manager)</div><div class="tag-list" style="margin-top:6px">${state.campaignData.interests.map(k=>`<span class="tag tag-accent">${k}</span>`).join("")}</div></div>
        <div class="panel"><div class="section-title">POSICIONAMENTOS RECOMENDADOS</div><div class="tag-list">${state.campaignData.placements.map(p=>`<span class="tag">${p}</span>`).join("")}</div></div>
        <div class="panel" style="text-align:center"><div id="activateArea"><button class="activate-btn" onclick="activate()">Ativar campanha</button><div class="dim-text">Para publicar de verdade, conecte sua conta Meta Ads.</div></div></div>`;
    }

    function activate() {
      document.getElementById("activateArea").innerHTML = `<div class="success-icon">✅</div><div class="success-title">Campanha pronta!</div><div class="dim-text" style="margin-top:4px">Material pronto para ser publicado no Meta Ads.</div>`;
    }
  </script>
</body>
</html>
